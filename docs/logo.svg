<svg viewBox="0 0 760 520" xmlns="http://www.w3.org/2000/svg">
  <!-- Moxie: original honey-badger mark (solid silhouette + pale mantle).
       Drawn from primitives for this project; MIT-licensed like the repo. -->
  <g fill="#E8862E">
    <!-- body -->
    <ellipse cx="400" cy="255" rx="215" ry="108"/>
    <!-- chest + head, low-slung the way badgers carry it -->
    <circle cx="208" cy="238" r="82"/>
    <!-- snout wedge + nose -->
    <path d="M150 212 L95 252 L162 282 Z"/>
    <circle cx="99" cy="254" r="13"/>
    <!-- ear -->
    <circle cx="252" cy="166" r="15"/>
    <!-- legs (stocky) + feet -->
    <rect x="238" y="290" width="50" height="140" rx="22"/>
    <ellipse cx="255" cy="428" rx="36" ry="15"/>
    <rect x="330" y="305" width="50" height="125" rx="22"/>
    <ellipse cx="347" cy="428" rx="36" ry="15"/>
    <rect x="445" y="305" width="50" height="125" rx="22"/>
    <ellipse cx="462" cy="428" rx="36" ry="15"/>
    <rect x="520" y="290" width="50" height="140" rx="22"/>
    <ellipse cx="537" cy="428" rx="36" ry="15"/>
    <!-- bushy tail, raised -->
    <ellipse cx="652" cy="180" rx="88" ry="40" transform="rotate(-24 652 180)"/>
  </g>
  <!-- the mantle: crown to tail, the honey badger's signature -->
  <path fill="#F4EDE2" d="M206 190
    C 260 158, 330 146, 400 144
    C 470 146, 545 160, 610 185
    C 645 172, 675 162, 702 162
    C 690 190, 668 210, 645 222
    C 590 214, 540 220, 480 226
    C 400 232, 310 228, 250 222
    C 228 218, 212 206, 206 190 Z"/>
  <!-- eye -->
  <circle cx="176" cy="228" r="8" fill="#F4EDE2"/>
  <!-- the ground it stands on, fearlessly -->
  <line x1="150" y1="458" x2="640" y2="458" stroke="#E8862E" stroke-width="7"
        stroke-linecap="round" stroke-dasharray="2 26"/>
</svg>
